# =============================================================================
# Prompter — Golden Q&A evaluation set (P-17)
# =============================================================================
#
# This is the quality gate for the whole bot. Every question here is phrased the
# way a real Cratis community member would ask it in Discord — natural, sometimes
# conversational, sometimes vague — and is answerable (or, for the out-of-scope
# block, deliberately NOT answerable) purely from the published docs at
# https://cratis.io. Nothing here depends on the bot being running; it grounds
# only in real doc pages.
#
# -----------------------------------------------------------------------------
# Schema (one entry per question, all under the top-level `questions:` list)
# -----------------------------------------------------------------------------
#   id             Stable, unique identifier. Never renumber — results,
#                  baselines (Eval/baseline.json) and regression diffs key off it.
#                  Prefix encodes the product: chr-/arc-/fun-/cmp-/cli-/gen-/oos-.
#   product        chronicle | arc | fundamentals | components | cli |
#                  cross-cutting | out-of-scope
#   type           definition | how-to | configuration | troubleshooting |
#                  concept | comparison | getting-started | refusal
#   question       Verbatim user phrasing, as it would land in Discord.
#   expected       answer  → the bot MUST answer, grounded and cited.
#                  refuse  → the bot MUST decline (out of scope / not in the docs).
#   expected_pages List of real cratis.io page URLs (canonical, WITHOUT the `.md`
#                  mirror suffix) that should ground a correct answer. Required
#                  when expected: answer; omitted when expected: refuse. Order is
#                  not significant — surfacing ANY one of them counts as a hit.
#   tags           Optional free-form hints (client language, sub-topic). Used by
#                  language-aware retrieval experiments (P-30); ignored otherwise.
#   rationale      Why this question is in the set / what it probes.
#
# -----------------------------------------------------------------------------
# How the P-18 harness consumes this file
# -----------------------------------------------------------------------------
# For each entry the harness runs `question` through IAnswers against the live
# corpus and scores:
#
#   expected: answer  (in-scope) — two checks must BOTH pass:
#     1. Retrieval hit — the retrieved passage set surfaces >= 1 of the URLs in
#        `expected_pages` (compare on page_url; the `.md` mirror is the ingested
#        form, so normalize by stripping a trailing `.md`). Measures whether
#        hybrid search found the right page at all.
#     2. Grounded + cited — the answer is not a refusal, is grounded in the
#        retrieved passages, and cites at least one source URL (groundedness /
#        citation-correctness via Microsoft.Extensions.AI.Evaluation, cribbing
#        eShopSupport's AnswerScoringEvaluator).
#
#   expected: refuse  (out-of-scope) — exactly one check:
#     * The bot must refuse honestly (no fabricated answer, no invented citation).
#       These calibrate the refusal threshold (Answering:MinScore, P-07) and guard
#       against the over-eager-answer failure mode. A confident answer here is the
#       worst possible outcome and should fail the run outright.
#
# Aggregate metrics: in-scope retrieval recall, in-scope citation accuracy,
# out-of-scope refusal rate. P-19 gates PRs on regression against the committed
# baseline. Note `expected_pages` are grounding candidates, not the only correct
# citations — a good answer may additionally cite closely-related pages.
#
# -----------------------------------------------------------------------------
# Coverage: 57 in-scope questions across all five products + cross-cutting, and
# 12 out-of-scope refusals. Breadth over cleverness — real questions the docs
# genuinely answer, spanning definition / how-to / configuration / troubleshooting
# / concept / comparison / getting-started. Every page below was checked against
# the live site (sitemap-0.xml + per-page .md mirrors) on 2026-07-15.
# =============================================================================

