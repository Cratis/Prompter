name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: false
      release-notes:
        description: "Release notes"
        required: false
  pull_request:
    types: [closed]

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      publish: ${{ steps.release.outputs.should-publish }}

    steps:
      - uses: actions/checkout@v4

      - name: Release
        id: release
        uses: cratis/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: ${{ github.event.inputs.version }}
          release-notes: ${{ github.event.inputs.release-notes }}

  publish-docker:
    if: needs.release.outputs.publish == 'true'
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            cratis/prompter:${{ needs.release.outputs.version }}
            cratis/prompter:latest
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
